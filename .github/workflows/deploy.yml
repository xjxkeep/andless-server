name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: crpi-hrity7yofv004168.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE: crpi-hrity7yofv004168.cn-shanghai.personal.cr.aliyuncs.com/15150276667/andless-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push Docker image
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/helms || git clone https://github.com/xjxkeep/helms.git /root/helms
            cd /root/helms
            git fetch origin main
            git reset --hard origin/main
            helm upgrade --install andless-server ./andless-server/ \
              --set image.tag=${{ github.sha }} \
              --set imagePullSecret.username="${{ secrets.ACR_USERNAME }}" \
              --set imagePullSecret.password="${{ secrets.ACR_PASSWORD }}" \
              --set env.OSS_ENDPOINT="${{ secrets.OSS_ENDPOINT }}" \
              --set env.OSS_ACCESS_KEY_ID="${{ secrets.OSS_ACCESS_KEY_ID }}" \
              --set env.OSS_ACCESS_KEY_SECRET="${{ secrets.OSS_ACCESS_KEY_SECRET }}" \
              --set env.OSS_BUCKET="${{ secrets.OSS_BUCKET }}" \
              --wait --timeout 120s
