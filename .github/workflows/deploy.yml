name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o andless-server .

      - name: Deploy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: andless-server
          target: /opt/andless-server

      - name: Install and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Make binary executable
            chmod +x /opt/andless-server/andless-server

            # Create env file if not exists
            if [ ! -f /opt/andless-server/.env ]; then
              cat > /opt/andless-server/.env <<'EOF'
            OSS_ENDPOINT=
            OSS_ACCESS_KEY_ID=
            OSS_ACCESS_KEY_SECRET=
            OSS_BUCKET=
            SERVER_PORT=8080
            EOF
              echo "⚠️  Created /opt/andless-server/.env — please fill in OSS credentials"
            fi

            # Install systemd service
            cat > /etc/systemd/system/andless-server.service <<'EOF'
            [Unit]
            Description=Andless Server
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/andless-server
            EnvironmentFile=/opt/andless-server/.env
            ExecStart=/opt/andless-server/andless-server
            Restart=on-failure
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            # Reload and restart
            systemctl daemon-reload
            systemctl enable andless-server
            systemctl restart andless-server
            systemctl status andless-server --no-pager
