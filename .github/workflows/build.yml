name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o andless-server .

      - name: Install ossutil v2
        run: |
          curl -fsSL -o ossutil.zip "https://gosspublic.alicdn.com/ossutil/v2/2.2.1/ossutil-2.2.1-linux-amd64.zip"
          unzip ossutil.zip
          sudo mv ossutil-2.2.1-linux-amd64/ossutil /usr/local/bin/
          ossutil version

      - name: Determine upload path
        id: oss-path
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "dir=release/${TAG}" >> "$GITHUB_OUTPUT"
            echo "filename=andless-server-${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=dev/latest" >> "$GITHUB_OUTPUT"
            echo "filename=andless-server" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          OSS_DIR="${{ steps.oss-path.outputs.dir }}"
          FILENAME="${{ steps.oss-path.outputs.filename }}"
          BUCKET="${{ secrets.OSS_BUCKET }}"
          ENDPOINT="${{ secrets.OSS_ENDPOINT }}"
          REGION=$(echo "$ENDPOINT" | sed 's/^oss-//;s/\.aliyuncs\.com$//')
          ossutil cp andless-server "oss://${BUCKET}/${OSS_DIR}/${FILENAME}" --endpoint="${ENDPOINT}" --region="${REGION}" --force
